<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="greeting-section">
    <div class="greeting-top">
      <div class="greeting-left">
        <p id="greeting-text">Selamat Pagi</p>
        <h1 id="user-name">Pengguna</h1>
        <p id="datetime-text"></p>
      </div>
      <div class="header-controls">
        <button class="icon-btn" id="edit-name-btn" title="Ubah Nama">✏️</button>
        <button class="icon-btn" id="theme-toggle" title="Ganti Tema">🌙</button>
      </div>
    </div>

    <!-- Name Modal -->
    <div id="name-modal" class="modal hidden">
      <div class="modal-box">
        <h3>Nama kamu</h3>
        <input type="text" id="name-input" placeholder="Masukkan nama..." maxlength="30" />
        <div class="modal-actions">
          <button class="btn-ghost" id="cancel-name-btn">Batal</button>
          <button class="btn-primary" id="save-name-btn">Simpan</button>
        </div>
      </div>
    </div>
  </header>

  <main class="dashboard">

    <!-- Focus Timer -->
    <section class="card timer-card">
      <p class="card-title">Focus Timer</p>

      <div class="timer-ring-wrap">
        <svg class="timer-ring" viewBox="0 0 100 100">
          <circle class="timer-ring-bg" cx="50" cy="50" r="45"/>
          <circle class="timer-ring-progress" id="timer-ring-progress" cx="50" cy="50" r="45"/>
        </svg>
        <div id="timer-display">25:00</div>
      </div>

      <div class="timer-controls">
        <button id="timer-start">Start</button>
        <button id="timer-stop">Stop</button>
        <button id="timer-reset">Reset</button>
      </div>

      <div class="timer-duration-row">
        <span>Durasi</span>
        <input type="number" id="timer-duration-input" min="1" max="120" value="25" />
        <span>menit</span>
        <button id="timer-set-btn">Set</button>
      </div>
    </section>

    <!-- To-Do List -->
    <section class="card todo-card">
      <p class="card-title">To-Do List</p>
      <div class="todo-input-row">
        <input type="text" id="todo-input" placeholder="Tambah tugas baru..." maxlength="100" />
        <button id="todo-add-btn">+ Tambah</button>
      </div>
      <p id="todo-error" class="error-msg hidden">Tugas sudah ada!</p>
      <ul id="todo-list"></ul>
    </section>

    <!-- Quick Links -->
    <section class="card links-card">
      <p class="card-title">Quick Links</p>
      <div class="link-input-row">
        <input type="text" id="link-name-input" placeholder="Nama situs..." maxlength="30" />
        <input type="url" id="link-url-input" placeholder="https://..." />
        <button id="link-add-btn">+ Tambah</button>
      </div>
      <div id="links-list"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
